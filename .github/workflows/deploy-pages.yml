name: Deploy AIScope SG

on:
  push:
    branches: ["main"]
    paths:
      - "data/processed/**"
      - "web/**"
      - "scripts/validate_data.py"
      - "scripts/pre_deploy_check.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages-deploy"
  cancel-in-progress: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Gatekeeper — validate data schema and audit
        run: python scripts/validate_data.py

      - name: Pre-deploy — fix absolute paths and verify SEO
        run: python scripts/pre_deploy_check.py

      - name: Verify index.html uses relative asset paths
        run: |
          set -e
          bad=$(grep -E '(href|src)="/' web/index.html | grep -v 'https://' | grep -v '//' || true)
          if [ -n "$bad" ]; then
            echo "ERROR: index.html still contains root-absolute href/src (breaks /repo/ GitHub Pages URLs):"
            echo "$bad"
            exit 1
          fi
          echo "OK: no root-absolute href/src in index.html"

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: web
          clean: true
          commit-message: "chore: deploy AIScope SG static site"
