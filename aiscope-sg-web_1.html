<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIScope SG — Singapore AI Job Exposure Index</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ── reset & base ────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080b0f;
  --surface:  #0f1419;
  --border:   #1e2730;
  --text:     #e8edf2;
  --muted:    #6b7a8d;
  --accent:   #00d4a0;

  /* Score colour stops */
  --c0:  #0fa76f;
  --c2:  #3ecf8e;
  --c4:  #f0b429;
  --c6:  #e07b3d;
  --c8:  #d94040;
  --c10: #a01c1c;

  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Sora', sans-serif;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

/* ── layout ──────────────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

header {
  padding: 18px 28px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  gap: 24px;
  flex-shrink: 0;
  background: var(--surface);
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}
.brand-name {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.5px;
  color: var(--text);
  line-height: 1;
}
.brand-name span { color: var(--accent); }
.brand-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.header-stats {
  display: flex;
  gap: 24px;
  margin-left: auto;
  flex-shrink: 0;
}
.stat {
  text-align: right;
}
.stat-val {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}
.stat-val.accent { color: var(--accent); }
.stat-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 3px;
}

/* ── controls bar ─────────────────────────────────────────────────── */
#controls {
  padding: 10px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  background: var(--bg);
}

#search {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 12px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  outline: none;
  width: 220px;
  transition: border-color 0.2s;
}
#search::placeholder { color: var(--muted); }
#search:focus { border-color: var(--accent); }

.filter-group {
  display: flex;
  gap: 6px;
  align-items: center;
}
.filter-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.pill {
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.pill:hover { border-color: var(--muted); color: var(--text); }
.pill.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,160,0.08); }

.size-toggle {
  margin-left: auto;
  display: flex;
  gap: 6px;
  align-items: center;
}

/* ── treemap canvas ───────────────────────────────────────────────── */
#canvas-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
}
#treemap {
  width: 100%;
  height: 100%;
  display: block;
}

/* ── legend ──────────────────────────────────────────────────────── */
#legend {
  padding: 8px 28px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
  background: var(--surface);
}
.legend-title {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  flex-shrink: 0;
}
.legend-scale {
  display: flex;
  align-items: center;
  gap: 0;
  flex: 1;
  max-width: 320px;
}
.legend-segment {
  height: 10px;
  flex: 1;
  position: relative;
}
.legend-segment:first-child { border-radius: 3px 0 0 3px; }
.legend-segment:last-child  { border-radius: 0 3px 3px 0; }
.legend-ticks {
  display: flex;
  justify-content: space-between;
  max-width: 320px;
  margin-top: 3px;
}
.legend-tick {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
}
.legend-note {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  margin-left: auto;
}

/* ── tooltip ──────────────────────────────────────────────────────── */
#tooltip {
  position: fixed;
  display: none;
  pointer-events: none;
  z-index: 1000;
  width: 300px;
  background: rgba(8, 11, 15, 0.97);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  backdrop-filter: blur(8px);
  box-shadow: 0 24px 48px rgba(0,0,0,0.6);
}
.tt-score-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 10px;
}
.tt-score {
  font-family: var(--mono);
  font-size: 36px;
  font-weight: 500;
  line-height: 1;
}
.tt-score-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
}
.tt-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.3;
}
.tt-cat {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}
.tt-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 10px 0;
}
.tt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 12px;
  margin-bottom: 10px;
}
.tt-item {}
.tt-item-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.tt-item-val {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
}
.tt-reason {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}
.tt-tags {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.tt-tag {
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 3px;
  border: 1px solid;
  letter-spacing: 0.05em;
}
.tt-tag.wfh      { color: #00d4a0; border-color: rgba(0,212,160,0.3); background: rgba(0,212,160,0.06); }
.tt-tag.regulated { color: #7b9fd4; border-color: rgba(123,159,212,0.3); background: rgba(123,159,212,0.06); }
.tt-tag.pwm       { color: #f0b429; border-color: rgba(240,180,41,0.3); background: rgba(240,180,41,0.06); }

/* ── highlight ────────────────────────────────────────────────────── */
.cell-highlight { stroke: #fff !important; stroke-width: 2px !important; }

/* ── no data ──────────────────────────────────────────────────────── */
#no-data {
  display: none;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 14px;
}

/* ── scrollbar ────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

<body>
<div id="app">
  <!-- Header -->
  <header>
    <div class="brand">
      <div class="brand-name">AI<span>Scope</span> SG</div>
      <div class="brand-sub">Singapore AI Job Exposure Index · 2024</div>
    </div>
    <div class="header-stats">
      <div class="stat">
        <div class="stat-val" id="stat-occ">—</div>
        <div class="stat-label">Occupations</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-emp">—</div>
        <div class="stat-label">Workers Tracked</div>
      </div>
      <div class="stat">
        <div class="stat-val accent" id="stat-avg">—</div>
        <div class="stat-label">Avg AI Score /10</div>
      </div>
    </div>
  </header>

  <!-- Controls -->
  <div id="controls">
    <input id="search" type="text" placeholder="Search occupation…">

    <div class="filter-group">
      <span class="filter-label">Risk</span>
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="low"    data-min="0" data-max="3">Low 0–3</button>
      <button class="pill" data-filter="medium" data-min="3" data-max="6">Med 3–6</button>
      <button class="pill" data-filter="high"   data-min="6" data-max="10">High 6–10</button>
    </div>

    <div class="filter-group">
      <span class="filter-label">Category</span>
      <select id="cat-select" style="
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 5px 10px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text);
        outline: none;
        cursor: pointer;
      ">
        <option value="all">All categories</option>
      </select>
    </div>

    <div class="size-toggle">
      <span class="filter-label">Size by</span>
      <button class="pill active" data-size="employment">Workers</button>
      <button class="pill" data-size="wage">Wage</button>
    </div>
  </div>

  <!-- Treemap -->
  <div id="canvas-wrap">
    <svg id="treemap"></svg>
    <div id="no-data">No occupations match this filter</div>
  </div>

  <!-- Legend -->
  <div id="legend">
    <div class="legend-title">AI exposure</div>
    <div>
      <div class="legend-scale">
        <div class="legend-segment" style="background:var(--c0)"></div>
        <div class="legend-segment" style="background:#1ab87d"></div>
        <div class="legend-segment" style="background:#8ecb5b"></div>
        <div class="legend-segment" style="background:#f0b429"></div>
        <div class="legend-segment" style="background:#e07b3d"></div>
        <div class="legend-segment" style="background:#d94040"></div>
        <div class="legend-segment" style="background:var(--c10)"></div>
      </div>
      <div class="legend-ticks">
        <span class="legend-tick">0 Safe</span>
        <span class="legend-tick">2</span>
        <span class="legend-tick">4</span>
        <span class="legend-tick">6</span>
        <span class="legend-tick">8</span>
        <span class="legend-tick">10 Exposed</span>
      </div>
    </div>
    <div class="legend-note">Box area = number of workers · Source: MOM 2024 + Claude AI</div>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- D3 v7 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<script>
// ── colour scale ──────────────────────────────────────────────────────────
const scoreColor = d3.scaleLinear()
  .domain([0, 2, 4, 6, 8, 10])
  .range(["#0fa76f","#3ecf8e","#f0b429","#e07b3d","#d94040","#a01c1c"])
  .clamp(true);

// ── state ─────────────────────────────────────────────────────────────────
let rawData  = null;
let sizeMode = "employment";   // or "wage"
let filterMin = 0, filterMax = 10;
let filterCat = "all";
let searchQ   = "";

// ── fetch data ────────────────────────────────────────────────────────────
fetch("data/data.json")
  .then(r => {
    if (!r.ok) throw new Error("data.json not found — run the pipeline first.");
    return r.json();
  })
  .then(data => {
    rawData = data;
    initUI(data);
    draw();
  })
  .catch(err => {
    document.getElementById("canvas-wrap").innerHTML =
      `<div style="display:flex;align-items:center;justify-content:center;
         height:100%;color:#6b7a8d;font-family:'IBM Plex Mono',monospace;font-size:13px;
         flex-direction:column;gap:12px;padding:40px;text-align:center;">
        <div style="font-size:32px">⚠</div>
        <div>${err.message}</div>
        <div style="font-size:11px;opacity:.6">Run: python run_pipeline.py</div>
       </div>`;
  });

// ── init controls ─────────────────────────────────────────────────────────
function initUI(data) {
  // Stats
  document.getElementById("stat-occ").textContent =
    data.meta.total_occupations.toLocaleString();
  document.getElementById("stat-emp").textContent =
    (data.meta.total_employment / 1000).toFixed(0) + "K";
  document.getElementById("stat-avg").textContent =
    data.meta.avg_ai_score.toFixed(1);

  // Category select
  const sel = document.getElementById("cat-select");
  data.children.forEach(cat => {
    const opt = document.createElement("option");
    opt.value = cat.name;
    opt.textContent = cat.name;
    sel.appendChild(opt);
  });

  sel.addEventListener("change", () => {
    filterCat = sel.value;
    draw();
  });

  // Risk pills
  document.querySelectorAll("[data-filter]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("[data-filter]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      if (btn.dataset.filter === "all") { filterMin = 0; filterMax = 10; }
      else { filterMin = +btn.dataset.min; filterMax = +btn.dataset.max; }
      draw();
    });
  });

  // Size toggle
  document.querySelectorAll("[data-size]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("[data-size]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      sizeMode = btn.dataset.size;
      draw();
    });
  });

  // Search
  document.getElementById("search").addEventListener("input", e => {
    searchQ = e.target.value.trim().toLowerCase();
    draw();
  });

  window.addEventListener("resize", draw);
}

// ── filter helpers ────────────────────────────────────────────────────────
function getFiltered(data) {
  const cats = data.children
    .filter(cat => filterCat === "all" || cat.name === filterCat)
    .map(cat => ({
      ...cat,
      children: cat.children.filter(occ =>
        occ.ai_score >= filterMin &&
        occ.ai_score <= filterMax &&
        (searchQ === "" || occ.name.toLowerCase().includes(searchQ))
      )
    }))
    .filter(cat => cat.children.length > 0);
  return { name: "root", children: cats };
}

// ── draw ──────────────────────────────────────────────────────────────────
function draw() {
  if (!rawData) return;

  const svg  = d3.select("#treemap");
  const wrap = document.getElementById("canvas-wrap");
  const W    = wrap.clientWidth;
  const H    = wrap.clientHeight;

  svg.attr("width", W).attr("height", H);
  svg.selectAll("*").remove();

  const filtered = getFiltered(rawData);
  const totalLeaves = filtered.children.reduce((s, c) => s + c.children.length, 0);

  document.getElementById("no-data").style.display =
    totalLeaves === 0 ? "flex" : "none";
  if (totalLeaves === 0) return;

  // Build hierarchy
  const value = d => sizeMode === "wage" ? d.gross_wage : d.employment;
  const hier  = d3.hierarchy(filtered)
    .sum(d => d.children ? 0 : value(d))
    .sort((a, b) => b.value - a.value);

  const treemap = d3.treemap()
    .size([W, H])
    .paddingOuter(4)
    .paddingTop(24)
    .paddingInner(2)
    .round(true);

  treemap(hier);

  // ── draw category labels ──────────────────────────────────────────────
  const cats = hier.children || [];

  cats.forEach(cat => {
    const g = svg.append("g");
    g.append("rect")
      .attr("x", cat.x0)
      .attr("y", cat.y0)
      .attr("width",  cat.x1 - cat.x0)
      .attr("height", cat.y1 - cat.y0)
      .attr("fill", "none")
      .attr("stroke", "rgba(255,255,255,0.04)")
      .attr("stroke-width", 1);

    // Category label bar
    const catW = cat.x1 - cat.x0;
    if (catW > 40) {
      g.append("rect")
        .attr("x", cat.x0)
        .attr("y", cat.y0)
        .attr("width",  catW)
        .attr("height", 20)
        .attr("fill", "rgba(255,255,255,0.03)");

      g.append("text")
        .attr("x", cat.x0 + 6)
        .attr("y", cat.y0 + 13)
        .attr("font-family", "'IBM Plex Mono', monospace")
        .attr("font-size", Math.min(10, catW / 8))
        .attr("fill", "rgba(255,255,255,0.35)")
        .attr("letter-spacing", "0.08em")
        .text(cat.data.name.toUpperCase().substring(0, Math.floor(catW / 6)));
    }
  });

  // ── draw leaves ───────────────────────────────────────────────────────
  const leaves = hier.leaves();
  const cell   = svg.selectAll("g.cell")
    .data(leaves)
    .enter()
    .append("g")
    .attr("class", "cell")
    .style("cursor", "pointer");

  cell.append("rect")
    .attr("x",      d => d.x0)
    .attr("y",      d => d.y0)
    .attr("width",  d => d.x1 - d.x0)
    .attr("height", d => d.y1 - d.y0)
    .attr("fill",   d => scoreColor(d.data.ai_score))
    .attr("fill-opacity", 0.82)
    .attr("stroke", "rgba(0,0,0,0.4)")
    .attr("stroke-width", 0.5)
    .attr("rx", 2);

  // Occupation labels (only if cell is big enough)
  cell.each(function(d) {
    const cellW = d.x1 - d.x0;
    const cellH = d.y1 - d.y0;
    if (cellW < 36 || cellH < 22) return;

    const g   = d3.select(this);
    const pad = 5;

    // Score badge (top-right)
    if (cellW > 48 && cellH > 30) {
      g.append("text")
        .attr("x", d.x1 - pad)
        .attr("y", d.y0 + 13)
        .attr("text-anchor", "end")
        .attr("font-family", "'IBM Plex Mono', monospace")
        .attr("font-size", Math.min(10, cellH * 0.18))
        .attr("font-weight", "500")
        .attr("fill", "rgba(255,255,255,0.75)")
        .text(d.data.ai_score.toFixed(1));
    }

    // Name label
    if (cellH > 26) {
      const fontSize = Math.min(12, Math.max(8, cellH * 0.12));
      const maxChars = Math.floor((cellW - pad * 2) / (fontSize * 0.55));
      const label    = truncate(d.data.name, maxChars);

      g.append("text")
        .attr("x", d.x0 + pad)
        .attr("y", d.y0 + cellH / 2 + 1)
        .attr("dominant-baseline", "middle")
        .attr("font-family", "'Sora', sans-serif")
        .attr("font-size", fontSize)
        .attr("font-weight", "500")
        .attr("fill", "rgba(255,255,255,0.90)")
        .text(label);
    }
  });

  // ── mouse events ──────────────────────────────────────────────────────
  const tt = document.getElementById("tooltip");

  cell
    .on("mousemove", function(event, d) {
      const data = d.data;
      const col  = scoreColor(data.ai_score);
      const riskLabel = data.ai_score < 3 ? "Low risk" :
                        data.ai_score < 6 ? "Moderate risk" :
                        data.ai_score < 8 ? "High risk" : "Very high risk";

      const tags = [];
      if (data.wfh)      tags.push('<span class="tt-tag wfh">WFH Feasible</span>');
      if (data.regulated) tags.push('<span class="tt-tag regulated">Regulated</span>');
      if (data.pwm)       tags.push('<span class="tt-tag pwm">PWM Protected</span>');

      tt.innerHTML = `
        <div class="tt-score-row">
          <div class="tt-score" style="color:${col}">${data.ai_score.toFixed(1)}</div>
          <div class="tt-score-label">/10 · ${riskLabel}</div>
        </div>
        <div class="tt-name">${data.name}</div>
        <div class="tt-cat">${d.parent.data.name}</div>
        <hr class="tt-divider">
        <div class="tt-grid">
          <div class="tt-item">
            <div class="tt-item-label">Median Gross Wage</div>
            <div class="tt-item-val">S$${data.gross_wage.toLocaleString()}/mo</div>
          </div>
          <div class="tt-item">
            <div class="tt-item-label">Est. Employment</div>
            <div class="tt-item-val">${data.employment.toLocaleString()}</div>
          </div>
          <div class="tt-item">
            <div class="tt-item-label">Key AI Risk</div>
            <div class="tt-item-val" style="font-size:11px">${data.risk_factor || "—"}</div>
          </div>
          <div class="tt-item">
            <div class="tt-item-label">AI Role</div>
            <div class="tt-item-val" style="font-size:11px">${data.ai_assists ? "Augments" : "Replaces"}</div>
          </div>
        </div>
        <div class="tt-reason">${data.reason || ""}</div>
        ${tags.length ? `<div class="tt-tags">${tags.join("")}</div>` : ""}
      `;

      const vpW = window.innerWidth;
      const vpH = window.innerHeight;
      const ttW = 300, ttH = 260;
      let left = event.clientX + 16;
      let top  = event.clientY + 16;
      if (left + ttW > vpW - 8) left = event.clientX - ttW - 16;
      if (top  + ttH > vpH - 8) top  = event.clientY - ttH - 16;

      tt.style.display = "block";
      tt.style.left = left + "px";
      tt.style.top  = top + "px";

      // Highlight cell
      d3.selectAll("g.cell rect:first-child").attr("stroke-width", 0.5);
      d3.select(this).select("rect").attr("stroke", "#fff").attr("stroke-width", 1.5);
    })
    .on("mouseleave", function() {
      tt.style.display = "none";
      d3.selectAll("g.cell rect:first-child")
        .attr("stroke", "rgba(0,0,0,0.4)")
        .attr("stroke-width", 0.5);
    });
}

// ── utils ─────────────────────────────────────────────────────────────────
function truncate(str, n) {
  return str.length > n ? str.substring(0, n - 1) + "…" : str;
}
</script>
