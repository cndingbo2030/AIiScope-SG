<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIScope SG — Redirecting</title>
  <script>
  (function () {
    var origin = window.location.origin || "";
    var path = window.location.pathname || "/";
    var search = window.location.search || "";
    var hash = window.location.hash || "";
    var host = (window.location.hostname || "").toLowerCase();

    try {
      sessionStorage.setItem(
        "aiscope-spa-redirect",
        JSON.stringify({
          from: location.href,
          at: Date.now(),
          pathname: path,
          search: search,
          hash: hash
        })
      );
    } catch (e) {}

    /** GitHub Pages project URLs are case-sensitive — only this exact segment serves the site. */
    var CANONICAL_REPO_SEGMENT = "AIiScope-SG";
    function repoSegmentFromPath(p) {
      var parts = p.split("/").filter(Boolean);
      if (!parts.length) return "";
      var first = parts[0];
      var low = first.toLowerCase();
      if (low === "aiiscope-sg" || low === "aiscope-sg") {
        return CANONICAL_REPO_SEGMENT;
      }
      return first;
    }

    var target;
    if (host.endsWith(".github.io")) {
      var repo = repoSegmentFromPath(path);
      if (repo) {
        target = origin + "/" + repo + "/index.html" + search + hash;
      } else {
        target = origin + "/index.html" + search + hash;
      }
    } else {
      var repoLocal = repoSegmentFromPath(path);
      if (repoLocal) {
        target = origin + "/" + repoLocal + "/index.html" + search + hash;
      } else {
        var dir = path.endsWith("/") ? path : path.replace(/\/[^/]*$/, "/");
        if (!dir || dir === "//") dir = "/";
        target = origin + dir + "index.html" + search + hash;
      }
    }
    window.location.replace(target);
  })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=https://cndingbo2030.github.io/AIiScope-SG/">
  </noscript>
</head>
<body style="margin:0;background:#080b0f;color:#6b7a8d;font-family:IBM Plex Mono,monospace;padding:24px;text-align:center;">
  <p>Redirecting to AIScope SG…</p>
  <p><a href="./index.html" style="color:#21c7d9">Continue to index</a></p>
</body>
</html>
